name: Daily AI News Scrape

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install curl_cffi openai pytz

    - name: Initialize SQLite database
      run: |
        python news_project/migrate_json_to_sqlite.py

    - name: Run scraper
      env:
        DEEPSEEK_API: ${{ secrets.DEEPSEEK_API }}
        DEEPSEEK_BASE_URL: https://api.deepseek.com
        GITHUB_ACTIONS: true
      run: |
        python news_project/main.py

    - name: Commit SQLite database
      run: |
        git config --global user.name 'NewsBot'
        git config --global user.email 'bot@noreply.github.com'
        git add -f news_monitor.db
        git commit -m "Daily News Update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git pull --rebase
        git push
